name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: macos
          - os: windows-latest
            artifact_name: windows
          - os: ubuntu-latest
            artifact_name: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build renderer and main
        run: npm run build

      # macOS + Linux. macOS is signed + notarized via CSC_*/APPLE_* (electron-builder
      # reads them automatically); Linux .deb needs no signing. CSC_LINK is the
      # Apple Developer ID cert and is intentionally NOT passed to the Windows
      # runner below (Apple certs don't work for Authenticode).
      - name: Publish to GitHub Releases (macOS / Linux)
        if: matrix.os != 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --publish always

      # Windows Authenticode signing. Picks a strategy based on which secrets exist,
      # so the build never fails when signing isn't configured (just ships unsigned).
      # See docs/windows-signing.md for setup + the SmartScreen truth.
      #   1. Azure Trusted Signing (production) — AZURE_* secrets present. Removes the
      #      "unknown publisher" warning for everyone, no manual trust needed.
      #   2. .pfx cert (beta) — WIN_CSC_LINK present. electron-builder auto-signs with
      #      it. A self-signed test cert does NOT clear SmartScreen unless the tester
      #      manually trusts it; an OV/EV .pfx does.
      #   3. Neither — UNSIGNED. Installable via "More info -> Run anyway".
      - name: Publish to GitHub Releases (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Option 1 — Azure Trusted Signing (Entra ID auth + account coordinates)
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_PUBLISHER_NAME: ${{ secrets.AZURE_PUBLISHER_NAME }}
          AZURE_CODE_SIGNING_ENDPOINT: ${{ secrets.AZURE_CODE_SIGNING_ENDPOINT }}
          AZURE_CODE_SIGNING_ACCOUNT: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT }}
          AZURE_CERT_PROFILE: ${{ secrets.AZURE_CERT_PROFILE }}
          # Option 2 — .pfx cert (electron-builder reads WIN_CSC_* automatically)
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if [ -n "$AZURE_CLIENT_ID" ]; then
            echo "Signing Windows build via Azure Trusted Signing"
            npx electron-builder --publish always \
              --config.win.azureSignOptions.publisherName="$AZURE_PUBLISHER_NAME" \
              --config.win.azureSignOptions.endpoint="$AZURE_CODE_SIGNING_ENDPOINT" \
              --config.win.azureSignOptions.codeSigningAccountName="$AZURE_CODE_SIGNING_ACCOUNT" \
              --config.win.azureSignOptions.certificateProfileName="$AZURE_CERT_PROFILE"
          elif [ -n "$WIN_CSC_LINK" ]; then
            echo "Signing Windows build via .pfx certificate (WIN_CSC_LINK)"
            npx electron-builder --publish always
          else
            echo "No Windows signing secrets set — publishing UNSIGNED (SmartScreen 'unknown publisher' expected)"
            npx electron-builder --publish always
          fi

  # electron-builder uploads to a DRAFT release (its GitHub default) — which is
  # what we want during the build: the 3 matrix runners all append assets to the
  # same draft without racing or ever exposing a half-uploaded release. This
  # final job flips that draft to published + Latest, but ONLY after every
  # platform build succeeds (`needs: build` won't run if any matrix job fails),
  # so a release is never published partial. Tag pushes only.
  publish-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Publish the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false --latest
