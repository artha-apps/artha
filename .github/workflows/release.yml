name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: macos
          - os: windows-latest
            artifact_name: windows
          - os: ubuntu-latest
            artifact_name: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build renderer and main
        run: npm run build

      # TODO(windows-signing): the Windows .exe ships UNSIGNED, so users hit a
      # SmartScreen "unknown publisher" warning (still installable via
      # "More info -> Run anyway"). Apple's Developer ID cert does NOT work on
      # Windows — it needs its own Authenticode cert.
      # ACTION once total installer downloads exceed ~100 (check with:
      #   gh release view <tag> --repo artha-apps/artha --json assets \
      #     --jq '[.assets[].downloadCount] | add'  )
      # get an Authenticode cert — Azure Trusted Signing (~$10/mo, CI-native) is
      # the cheapest modern option — then add a Windows-only signing step here.
      # Linux .deb needs no signing; macOS is already signed + notarized.
      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization. Only consumed on the macOS runner;
          # ignored (harmless) on Windows/Linux. electron-builder reads these
          # automatically — CSC_* for the Developer ID cert, APPLE_* for notarytool.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --publish always
