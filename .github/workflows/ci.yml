name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Main process — Electron + Node APIs
      - name: Type-check app package
        run: npx tsc -p packages/app/tsconfig.json --noEmit

      # Renderer — React + browser APIs
      - name: Type-check renderer package
        run: npx tsc -p packages/renderer/tsconfig.json --noEmit

  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

  test:
    # Phase A touches per-OS behavior (keychain policy, path handling), so the
    # unit suite runs on all three platforms. NOTE: this proves the mocked
    # policy logic cross-platform — native keychain integration (real
    # libsecret/DPAPI) still needs manual validation per the threat model §3.
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present
